project:
  name: Fin-RAG-Knowledge-Base
  raw_dir: data/raw
  processed_markdown_dir: data/processed/markdown
  duplicate_dir: data/processed/duplicates
  index_dir: data/index/faiss
  logs_dir: logs
request:
  user_agent: 'Fin-RAG-Knowledge-Base/0.1 (+research use; contact: local)'
  timeout_seconds: 25
  delay_seconds: 2.0
  max_pages: 3
  max_docs_per_source: 5
llm:
  provider: siliconflow
  model: deepseek-ai/DeepSeek-V3
  base_url: https://api.siliconflow.cn/v1
  max_tokens: 1024
  api_key_env: SILICONFLOW_API_KEY

# Local Ollama profile — switch by replacing the llm block above with this.
# No API key needed. Requires: ollama serve + ollama pull <model>
# Example: change provider/model/base_url to the values below.
#
# llm:
#   provider: ollama
#   model: qwen2.5:7b
#   base_url: http://localhost:11434/v1
#   max_tokens: 1024
#   api_key_env: ""   # Ollama does not require an API key
embedding:
  provider: huggingface
  model_name: BAAI/bge-small-zh-v1.5
  normalize_embeddings: true
  fallback_provider: hashing
  hashing_dimension: 512
chunking:
  # strategy: recursive (default) | semantic
  # recursive: fixed character-count splits — fast, no model needed at build time.
  # semantic:  splits at sentence-level cosine-similarity breakpoints — better
  #            chunk integrity, but requires loading the embedding model before
  #            splitting and rebuilding the full FAISS index from scratch.
  strategy: recursive
  chunk_size: 900
  chunk_overlap: 150
  # Cosine similarity threshold for semantic chunking only.
  # A new chunk starts when adjacent sentence similarity drops below this value.
  # Lower = fewer, larger chunks; higher = more, smaller chunks. (default 0.45)
  semantic_breakpoint_threshold: 0.45
  # Documents whose title contains any of these strings are excluded from indexing.
  # Their existing FAISS entries are removed on the next incremental update run.
  # English annual reports duplicate Chinese ones and consume ~10% of index space.
  exclude_title_patterns:
    - "英文版"
  # Hard cap on chunks per source file.  Prevents one 300-page annual report from
  # occupying 1000+ index slots.  We keep the first 25% verbatim (intro / highlights)
  # and sample the remainder evenly, so full-doc coverage is preserved.
  max_chunks_per_doc: 80
sources:
  gov_policy:
    enabled: true
    source_name: gov_policy
    list_urls:
    - https://www.gov.cn/zhengce/zuixin/
    - https://www.gov.cn/zhengce/zhengcewenjianku/
    allowed_domains:
    - www.gov.cn
    - app.www.gov.cn
    include_keywords:
    - 政策
    - 通知
    - 意见
    - 办法
    - 方案
    - 规划
    exclude_keywords:
    - 视频
    - 图解
  ndrc:
    enabled: true
    source_name: ndrc
    list_urls:
    - https://www.ndrc.gov.cn/xxgk/wjk/index.html
    - https://www.ndrc.gov.cn/xxgk/zcfb/tz/
    allowed_domains:
    - www.ndrc.gov.cn
    include_keywords:
    - 通知
    - 公告
    - 规划
    - 政策
    - 发改
  csrc:
    enabled: true
    source_name: csrc
    list_urls:
    - https://www.csrc.gov.cn/csrc/c100039/common_list.shtml
    - https://www.csrc.gov.cn/csrc/c101954/common_list.shtml
    allowed_domains:
    - www.csrc.gov.cn
    include_keywords:
    - 政策
    - 通知
    - 公告
    - 指引
    - 规定
    - 办法
    - 准则
    - 标准
    - 方案
    - 意见
    - 证券
    - 上市公司
    url_patterns:
    - /csrc/.+\.shtml$
    - /csrc/.+\.html$
    - /csrc/.+\.pdf$
    exclude_url_patterns:
    - common_list
    max_docs_per_source: 5
  miit:
    enabled: true
    source_name: miit
    list_urls:
    - https://www.miit.gov.cn/zwgk/zcwj/wjfb/tz/index.html
    - https://www.miit.gov.cn/zwgk/zcwj/wjfb/gg/index.html
    allowed_domains:
    - www.miit.gov.cn
    include_keywords:
    - 通知
    - 公告
    - 规划
    - 政策
    - 算力
    - 人工智能
    - 信息通信
    - 工业互联网
    - 数据中心
    url_patterns:
    - /art/\d{4}/art_.+\.html$
    - /cms_files/.+\.pdf$
    exclude_url_patterns:
    - /index\.html$
    max_docs_per_source: 5
